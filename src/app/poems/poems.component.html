<mat-card class="card" appearance="outlined">
  <mat-card-header>
    <mat-card-title> {{ (currentPoem$ | async)?.title}} </mat-card-title>
    <mat-card-subtitle> {{ (currentPoem$ | async)?.author}}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>
      {{ (currentPoem$ | async)?.poem}}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" (click)="newPoem()">
      <mat-icon>favorite</mat-icon>
      Voir un nouveau poème
    </button>
  </mat-card-actions>
</mat-card>

<mat-card *ngIf="(currentPoem$|async)?.author === 'Alfred de Musset'" id="tips">
  <mat-card-content>
    Tu as vu ce poème c'est écrit par Alfred le frérot de ta rue =)
  </mat-card-content>
</mat-card>
